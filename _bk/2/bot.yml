name: Twitter Bot

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（1時間ごと）
  workflow_dispatch:        # GitHub UIから手動実行も可能

concurrency:
  group: twitter-bot
  cancel-in-progress: false  # 実行中は新しいジョブを待機させる

permissions:
  contents: write   # state.jsonをコミットし返すために必要

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-liberation fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
